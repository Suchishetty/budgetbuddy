<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { font-family: 'Times New Roman', Times, serif; background-color: #f5f5f5; }

        /* Header */
        header {
            background: linear-gradient(90deg, #00695c, #2e7d32);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
        }
        .menu-btn { font-size: 24px; cursor: pointer; margin-right: 15px; }

        /* Sidebar */
        .sidebar {
            height: 100%; width: 0; position: fixed; top: 0; left: 0;
            background-color: #2e7d32; overflow-x: hidden;
            transition: 0.3s; padding-top: 60px;
        }
        .sidebar a {
            padding: 12px 20px; text-decoration: none; font-size: 18px;
            color: #f1f1f1; display: block; transition: 0.3s;
        }
        .sidebar a:hover { background-color: #f9a825; color: #fff; }

        /* Cards */
        .card { margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .card-header {
            background-color: #e0f2f1; font-weight: bold; color: #00695c;
            border-left: 5px solid #f9a825;
        }

        /* Tables */
        table { width: 80%; margin: 20px auto; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border: 1px solid #ccc; }
        th { background-color: #00695c; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        tr:hover { background-color: #ddd; }

        /* Totals */
        .expense-total { font-size: 18px; font-weight: bold; color: #2e7d32; margin-top: 15px; }
    </style>
</head>
<body>

<!-- Page Content -->
{% block start %}
{% endblock %}

<script>
    function openNav() { document.getElementById("mySidebar").style.width = "250px"; }
    function closeNav() { document.getElementById("mySidebar").style.width = "0"; }
    console.log('Base template loaded');
</script>
</body>
</html>
